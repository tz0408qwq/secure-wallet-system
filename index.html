<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GameWallet - 安全遊戲物品交易平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0b2b26 0%, #1a4a3a 100%);
            min-height: 100vh;
            color: #1e2f3a;
        }
        /* 容器與卡片 */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 1.5rem;
        }
        .card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
            padding: 2rem;
            margin-bottom: 2rem;
            transition: all 0.2s;
        }
        /* 導航 */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: #f9c74f;
            letter-spacing: -0.5px;
        }
        .logo span {
            color: white;
            font-weight: 500;
        }
        .nav-links {
            display: flex;
            gap: 1.2rem;
            align-items: center;
        }
        .nav-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .nav-btn:hover {
            background: #f9c74f;
            color: #1e4a3b;
            border-color: #f9c74f;
        }
        .btn-primary {
            background: #f9c74f;
            border: none;
            color: #1e4a3b;
            font-weight: 600;
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary:hover {
            background: #ffda7c;
            transform: scale(0.98);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #f9c74f;
            color: #f9c74f;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
        }
        /* 表單 */
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 500;
            color: #2d5a4b;
        }
        input, select {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 1.2rem;
            font-size: 1rem;
            outline: none;
        }
        input:focus {
            border-color: #f9c74f;
            box-shadow: 0 0 0 2px rgba(249,199,79,0.3);
        }
        .hero {
            text-align: center;
            padding: 3rem 1rem;
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f9c74f, #f9844a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px,1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .feature-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .feature-card i {
            font-size: 2.5rem;
            color: #f9c74f;
            margin-bottom: 1rem;
        }
        /* 頁面切換 */
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }
        .error-msg {
            color: #e07c4c;
            font-size: 0.8rem;
            margin-top: 0.3rem;
        }
        .success-msg {
            color: #2b7a4b;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        @media (max-width: 700px) {
            .container {
                padding: 1rem;
            }
            .hero h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 導航欄 -->
    <div class="navbar">
        <div class="logo">Game<span>Wallet</span></div>
        <div class="nav-links" id="navLinks">
            <!-- 動態顯示登入/登出按鈕 -->
        </div>
    </div>

    <!-- 頁面：首頁 (Landing) -->
    <div id="landingPage" class="page active">
        <div class="card hero">
            <h1>安全、快速、透明的遊戲物品交易</h1>
            <p style="font-size: 1.2rem; margin: 1rem 0;">專為遊戲玩家設計的數位錢包，支援 P2P 託管、BNPL 靈活付款</p>
            <button id="getStartedBtn" class="btn-primary" style="margin-top: 1rem;">開始使用 →</button>
        </div>
        <div class="card">
            <h2 style="margin-bottom: 1rem;">為什麼選擇 GameWallet？</h2>
            <div class="feature-grid">
                <div class="feature-card"><i class="fas fa-shield-alt"></i><h3>託管保護</h3><p>第三方資金託管，交易安全零風險</p></div>
                <div class="feature-card"><i class="fas fa-credit-card"></i><h3>先買後付</h3><p>BNPL 靈活分期，輕鬆獲取心愛道具</p></div>
                <div class="feature-card"><i class="fas fa-exchange-alt"></i><h3>跨遊戲市場</h3><p>支援 CS2、Dota2、Rust 等多款熱門遊戲</p></div>
                <div class="feature-card"><i class="fas fa-chart-line"></i><h3>即時合規監控</h3><p>AI 詐欺偵測，保障公平交易</p></div>
            </div>
        </div>
    </div>

    <!-- 頁面：登入/註冊 -->
    <div id="authPage" class="page">
        <div class="card" style="max-width: 480px; margin: 0 auto;">
            <div class="flex-between" style="margin-bottom: 1rem;">
                <button id="showLoginTab" class="btn-outline" style="flex:1; margin-right:0.5rem;">登入</button>
                <button id="showRegisterTab" class="btn-outline" style="flex:1;">註冊</button>
            </div>
            <!-- 登入表單 -->
            <div id="loginForm">
                <div class="form-group">
                    <label>電子郵件</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" id="loginPassword" placeholder="密碼">
                </div>
                <button id="doLoginBtn" class="btn-primary" style="width:100%;">登入</button>
                <div id="loginError" class="error-msg" style="margin-top: 0.8rem;"></div>
            </div>
            <!-- 註冊表單 -->
            <div id="registerForm" style="display:none;">
                <div class="form-group">
                    <label>用戶名稱</label>
                    <input type="text" id="regName" placeholder="玩家名稱">
                </div>
                <div class="form-group">
                    <label>電子郵件</label>
                    <input type="email" id="regEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" id="regPassword" placeholder="至少6位">
                </div>
                <button id="doRegisterBtn" class="btn-primary" style="width:100%;">註冊</button>
                <div id="regError" class="error-msg" style="margin-top: 0.8rem;"></div>
            </div>
        </div>
    </div>

    <!-- 頁面：儀表板 (簡單佔位，後續逐步完善) -->
    <div id="dashboardPage" class="page">
        <div class="card">
            <h2>歡迎，<span id="userNameDisplay"></span>！</h2>
            <p>這是您的個人錢包儀表板（後續將添加完整功能）</p>
            <div style="margin-top: 1.5rem; background:#eef3f0; padding:1rem; border-radius:1rem;">
                <p><strong>錢包餘額：</strong> <span id="walletBalance">0.00</span> USD</p>
                <p><strong>BNPL 可用額度：</strong> <span id="bnplLimit">0.00</span> USD</p>
            </div>
            <button id="logoutBtn" class="btn-outline" style="margin-top:1rem;">登出</button>
        </div>
    </div>
</div>

<script>
    // ---------- 模擬資料庫 (localStorage) ----------
    let users = [];
    let currentUser = null;

    // 初始化儲存
    function initStorage() {
        if (!localStorage.getItem('gamewallet_users')) {
            // 預設一個測試用戶
            const defaultUsers = [
                { id: '1', name: '測試玩家', email: 'test@example.com', password: '123456', wallet: 1250.00, bnplCredit: 500.00, kycLevel: 1, createdAt: Date.now() }
            ];
            localStorage.setItem('gamewallet_users', JSON.stringify(defaultUsers));
        }
        users = JSON.parse(localStorage.getItem('gamewallet_users'));
        const savedUser = localStorage.getItem('gamewallet_currentUser');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            // 確保用戶資料同步 (如餘額)
            const fresh = users.find(u => u.id === currentUser.id);
            if (fresh) currentUser = fresh;
        }
    }

    // 儲存用戶列表
    function saveUsers() {
        localStorage.setItem('gamewallet_users', JSON.stringify(users));
    }

    // 更新當前用戶會話
    function setCurrentUser(user) {
        currentUser = user;
        localStorage.setItem('gamewallet_currentUser', JSON.stringify(user));
    }

    // 清除登入狀態
    function logout() {
        currentUser = null;
        localStorage.removeItem('gamewallet_currentUser');
        showPage('landingPage');
        updateNav();
    }

    // 顯示頁面
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        if (pageId === 'dashboardPage' && currentUser) {
            document.getElementById('userNameDisplay').innerText = currentUser.name;
            document.getElementById('walletBalance').innerText = currentUser.wallet.toFixed(2);
            document.getElementById('bnplLimit').innerText = currentUser.bnplCredit.toFixed(2);
        }
        updateNav();
    }

    // 更新導航列按鈕
    function updateNav() {
        const navDiv = document.getElementById('navLinks');
        if (currentUser) {
            navDiv.innerHTML = `<span style="color:white;">${currentUser.name}</span><button id="navDashboardBtn" class="nav-btn">儀表板</button><button id="navLogoutBtn" class="nav-btn">登出</button>`;
            document.getElementById('navDashboardBtn')?.addEventListener('click', () => showPage('dashboardPage'));
            document.getElementById('navLogoutBtn')?.addEventListener('click', () => logout());
        } else {
            navDiv.innerHTML = `<button id="navLoginBtn" class="nav-btn">登入</button><button id="navRegisterBtn" class="nav-btn">註冊</button>`;
            document.getElementById('navLoginBtn')?.addEventListener('click', () => { showPage('authPage'); switchTab('login'); });
            document.getElementById('navRegisterBtn')?.addEventListener('click', () => { showPage('authPage'); switchTab('register'); });
        }
    }

    // 切換登入/註冊標籤
    function switchTab(tab) {
        const loginDiv = document.getElementById('loginForm');
        const registerDiv = document.getElementById('registerForm');
        const loginBtn = document.getElementById('showLoginTab');
        const regBtn = document.getElementById('showRegisterTab');
        if (tab === 'login') {
            loginDiv.style.display = 'block';
            registerDiv.style.display = 'none';
            loginBtn.style.background = '#f9c74f';
            loginBtn.style.border = 'none';
            regBtn.style.background = 'transparent';
            regBtn.style.border = '1px solid #f9c74f';
        } else {
            loginDiv.style.display = 'none';
            registerDiv.style.display = 'block';
            regBtn.style.background = '#f9c74f';
            regBtn.style.border = 'none';
            loginBtn.style.background = 'transparent';
            loginBtn.style.border = '1px solid #f9c74f';
        }
    }

    // 註冊邏輯
    function register(name, email, password) {
        if (!name || !email || !password) return "請填寫所有欄位";
        if (users.find(u => u.email === email)) return "此電子郵件已被註冊";
        const newId = (users.length + 1).toString();
        const newUser = {
            id: newId,
            name: name,
            email: email,
            password: password,
            wallet: 100.00,       // 新用戶贈送 100 測試金
            bnplCredit: 300.00,
            kycLevel: 0,
            createdAt: Date.now()
        };
        users.push(newUser);
        saveUsers();
        setCurrentUser(newUser);
        showPage('dashboardPage');
        return null;
    }

    // 登入邏輯
    function login(email, password) {
        const user = users.find(u => u.email === email && u.password === password);
        if (!user) return "電子郵件或密碼錯誤";
        setCurrentUser(user);
        showPage('dashboardPage');
        return null;
    }

    // 事件綁定
    document.addEventListener('DOMContentLoaded', () => {
        initStorage();
        updateNav();

        // 首頁按鈕
        document.getElementById('getStartedBtn')?.addEventListener('click', () => {
            if (currentUser) showPage('dashboardPage');
            else showPage('authPage');
        });

        // 登入/註冊標籤
        document.getElementById('showLoginTab')?.addEventListener('click', () => switchTab('login'));
        document.getElementById('showRegisterTab')?.addEventListener('click', () => switchTab('register'));

        // 登入動作
        document.getElementById('doLoginBtn')?.addEventListener('click', () => {
            const email = document.getElementById('loginEmail').value.trim();
            const pwd = document.getElementById('loginPassword').value;
            const err = login(email, pwd);
            if (err) document.getElementById('loginError').innerText = err;
            else document.getElementById('loginError').innerText = '';
        });
        // 註冊動作
        document.getElementById('doRegisterBtn')?.addEventListener('click', () => {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pwd = document.getElementById('regPassword').value;
            const err = register(name, email, pwd);
            if (err) document.getElementById('regError').innerText = err;
            else document.getElementById('regError').innerText = '';
        });

        // 若已有登入狀態，預設顯示儀表板（可根據需求改為首頁）
        if (currentUser) {
            showPage('dashboardPage');
        } else {
            showPage('landingPage');
        }
    });
</script>
</body>
</html>
